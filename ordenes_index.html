// ── helpers UI ──────────────────────────────────────────────────────────────
function Fld({label,value,onChange,ph='',req,ta,tp='text'}){
  const[f,setF]=useState(false);
  const s={border:'1.5px solid '+(f?G:BR),borderRadius:8,padding:'9px 12px',fontSize:14,color:DK,background:'#fff',outline:'none',width:'100%',fontFamily:'inherit',resize:'vertical'};
  return(<div style={{display:'flex',flexDirection:'column',gap:4}}>
    <label style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase'}}>{label}{req&&<span style={{color:'#e05'}}> *</span>}</label>
    {ta?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} rows={3} style={s} onFocus={()=>setF(true)} onBlur={()=>setF(false)}/>
    :<input type={tp} value={value} onChange={e=>onChange(e.target.value)} placeholder={ph} style={s} onFocus={()=>setF(true)} onBlur={()=>setF(false)}/>}
  </div>);
}
function Sel({label,value,onChange,opts,req}){
  return(<div style={{display:'flex',flexDirection:'column',gap:4}}>
    <label style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase'}}>{label}{req&&<span style={{color:'#e05'}}> *</span>}</label>
    <select value={value} onChange={e=>onChange(e.target.value)} style={{border:'1.5px solid '+BR,borderRadius:8,padding:'9px 12px',fontSize:14,color:value?DK:'#999',background:'#fff',outline:'none',width:'100%',fontFamily:'inherit',cursor:'pointer'}}>
      <option value="">— Seleccionar —</option>
      {opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
    </select>
  </div>);
}
function Btn({ch,onClick,v='primary',dis,sm,full}){
  const V={primary:{background:G,color:'#fff',border:'none'},secondary:{background:'#fff',color:AC,border:'1.5px solid '+BR},danger:{background:'#fff',color:'#c0392b',border:'1.5px solid #f5c6cb'}};
  return <button onClick={onClick} disabled={dis} style={{...V[v],borderRadius:8,padding:sm?'5px 12px':'9px 18px',fontSize:sm?12:14,fontWeight:700,cursor:dis?'not-allowed':'pointer',opacity:dis?.6:1,whiteSpace:'nowrap',width:full?'100%':'auto',fontFamily:'inherit'}}>{ch}</button>;
}

// ── CSV / Excel parser ──────────────────────────────────────────────────────
function parseData(raw,ext){
  // normalize rows: array of objects
  let rows=[];
  if(ext==='csv'||ext==='tsv'||ext==='txt'){
    const lines=raw.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2)return[];
    const sep=lines[0].includes('\t')?'\t':lines[0].includes(';')?';':',';
    const hdr=lines[0].split(sep).map(h=>h.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''));
    const MAP={apellidoNombre:['apellido y nombre','apellidonombre','nombre y apellido','nombre','apellido'],dni:['dni','cuil','dni/cuil','documento'],siniestro:['siniestro','nro siniestro','numero siniestro','num siniestro'],cobertura:['cobertura','obra social','aseguradora'],fecha:['fecha','fecha confeccion','fecha de confeccion'],tipoPrestacion:['prestacion','tipo prestacion','prescripcion'],diagnostico:['diagnostico','diag'],profesionalId:['codigo','codigo afirmante','profesional','matricula']};
    const idx={};
    Object.entries(MAP).forEach(([f,al])=>{al.forEach(a=>{const i=hdr.findIndex(h=>h.includes(a));if(i!==-1&&idx[f]===undefined)idx[f]=i;});});
    rows=lines.slice(1).map(line=>{
      const cols=line.split(sep);
      const r={id:uid()};
      Object.keys(idx).forEach(f=>{r[f]=(cols[idx[f]]||'').trim();});
      if(!r.fecha)r.fecha=today();
      // parse fecha dd/mm/yyyy -> yyyy-mm-dd
      if(r.fecha&&r.fecha.includes('/')){const[dd,mm,yy]=r.fecha.split('/');r.fecha=yy+'-'+mm.padStart(2,'0')+'-'+dd.padStart(2,'0');}
      return r;
    }).filter(r=>r.apellidoNombre||r.dni);
  }
  return rows;
}

// ── PDF generator – tono institucional ──────────────────────────────────────
function getProfById(id){
  const profs = LS.get('p')||[];
  // Buscar por ID primero
  let prof = profs.find(p=>p.id===id);
  if(prof) return prof;
  // Si no encuentra por ID, buscar por matrícula
  prof = profs.find(p=>p.matriculaNum===String(id).trim());
  if(prof) return prof;
  // Si no encuentra por matrícula, buscar por nombre completo
  const nombre = String(id).toLowerCase().trim();
  prof = profs.find(p=>(p.nombre+' '+p.apellido).toLowerCase().trim()===nombre);
  return prof || {};
}

function generarPDF(o){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const PL=65,PR=530,PW=465,PH=841;

  // ── LOGO ──────────────────────────────────────────────────────────────────
  const logoB64=LS.get('logo_custom')||LOGO_ISL;
  try{doc.addImage(logoB64,'JPEG',PL,28,130,50);}catch(e){
    doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(15,110,86);
    doc.text('ISL',PL,58);doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100);
    doc.text('Medicina Empresarial',PL,70);
  }

  // ── Número de orden + Fecha (cabecera derecha) ────────────────────────────
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(80);
  const hoy=fmt(o.fecha);
  doc.text('Buenos Aires, ' + hoy, PR, 42, 'right');

  // ── Línea de separación ──────────────────────────────────────────────────
  doc.setDrawColor(15,110,86);doc.setLineWidth(1.2);
  doc.line(PL,88,PR,88);
  doc.setLineWidth(0.5);doc.setDrawColor(180);

  // ── Título del documento ─────────────────────────────────────────────────
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(15,110,86);
  doc.text('ORDEN DE PRESTACIÓN MÉDICA',PL,108);
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(80);
  doc.text('Servicio de Medicina Laboral',PL,121);

  // ── Caja datos del afiliado ──────────────────────────────────────────────
  doc.setFillColor(244,250,247);
  doc.roundedRect(PL,132,PW,98,4,4,'F');
  doc.setDrawColor(200,230,212);doc.roundedRect(PL,132,PW,98,4,4,'S');

  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(46,125,87);
  doc.text('DATOS DEL AFILIADO',PL+10,148);

  const campo=(lbl,val,x,y)=>{
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(50);
    doc.text(lbl,x,y);
    doc.setFont('helvetica','normal');doc.setTextColor(30);
    doc.text(String(val||'-'),x+doc.getTextWidth(lbl)+3,y);
  };
  campo('Apellido y Nombre:  ',o.apellidoNombre,PL+10,163);
  campo('DNI / CUIL:  ',o.dni,PL+10,178);
  campo('N° de Siniestro:  ',o.siniestro||'-',PL+10,193);
  campo('Cobertura:  ',o.cobertura||'-',PL+10,208);

  // ── Prescripción ─────────────────────────────────────────────────────────
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(15,110,86);
  doc.text('PRESCRIPCIÓN MÉDICA',PL,252);
  doc.setDrawColor(15,110,86);doc.setLineWidth(0.5);
  doc.line(PL,256,PL+doc.getTextWidth('PRESCRIPCIÓN MÉDICA'),256);
  doc.setLineWidth(0.4);doc.setDrawColor(180);

  doc.setFont('helvetica','normal');doc.setFontSize(11);doc.setTextColor(30);
  const prestLines=doc.splitTextToSize('Se solicita la realización de: '+o.tipoPrestacion+'.',PW);
  doc.text(prestLines,PL,272);
  let yAfterPrest=272+prestLines.length*16;

  // ── Diagnóstico ──────────────────────────────────────────────────────────
  if(o.diagnostico){
    yAfterPrest+=14;
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(15,110,86);
    doc.text('DIAGNÓSTICO:',PL,yAfterPrest);
    doc.setFont('helvetica','normal');doc.setTextColor(30);
    doc.text(o.diagnostico,PL+doc.getTextWidth('DIAGNÓSTICO:')+4,yAfterPrest);
    yAfterPrest+=16;
  }

  // ── Indicaciones / texto institucional ───────────────────────────────────
  yAfterPrest+=20;
  doc.setFontSize(9);doc.setFont('helvetica','italic');doc.setTextColor(100);
  const notaLines=doc.splitTextToSize('La presente orden tiene validez de 30 (treinta) días corridos a partir de la fecha de emisión. Deberá presentarse junto con el documento de identidad del afiliado al momento de la realización del estudio.',PW);
  doc.text(notaLines,PL,yAfterPrest);

  // ── Firma del profesional ─────────────────────────────────────────────────
  const prof=getProfById(o.profesionalId);
  const firmaY=PH-130;

  doc.setDrawColor(180);doc.setLineWidth(0.4);

  if(prof.firma){
    try{
      const ext=prof.firma.startsWith('data:image/png')?'PNG':'JPEG';
      doc.addImage(prof.firma,ext,PL,firmaY-70,150,60);
    }catch(e){}
  }

  // Línea de firma
  doc.line(PL,firmaY,PL+180,firmaY);

  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(30);
  doc.text((prof.nombre||'')+' '+(prof.apellido||''),PL,firmaY+14);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(80);
  if(prof.especialidad)doc.text('Esp. '+prof.especialidad,PL,firmaY+26);
  if(prof.tipo&&prof.matriculaNum)doc.text(prof.tipo+'. '+prof.matriculaNum,PL,firmaY+38);

  // ── Pie de página ─────────────────────────────────────────────────────────
  doc.setDrawColor(15,110,86);doc.setLineWidth(0.8);
  doc.line(PL,PH-55,PR,PH-55);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120);
  doc.text('ISL · Medicina Empresarial · www.islarg.com.ar',PL,PH-42);
  doc.text('Documento generado digitalmente — no requiere firma ológrafa adicional',PR,PH-42,'right');

  return doc;
}

// ── IMPORTAR EXCEL / CSV ─────────────────────────────────────────────────────
function ImportarExcel({session,onSave}){
  const[preview,setPreview]=useState(null);
  const[err,setErr]=useState('');
  const[ok,setOk]=useState('');
  const[loading,setLoading]=useState(false);
  const ref=useRef();

  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    setErr('');setOk('');setPreview(null);setLoading(true);
    const ext=file.name.split('.').pop().toLowerCase();
    const reader=new FileReader();

    if(ext==='xlsx'||ext==='xls'){
      reader.onload=ev=>{
        try{
          // Manual XLSX parsing via binary
          const ab=ev.target.result;
          const arr=new Uint8Array(ab);
          // Simple CSV extraction fallback - parse as text if XLSX fails
          // Try to use SheetJS if available
          if(window.XLSX){
            const wb=window.XLSX.read(arr,{type:'array'});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const csv=window.XLSX.utils.sheet_to_csv(ws);
            const rows=parseData(csv,'csv');
            if(!rows.length){setErr('No se encontraron filas válidas. Verificá los encabezados.');setLoading(false);return;}
            setPreview(rows);setLoading(false);
          } else {
            setErr('Para archivos .xlsx usá la opción de exportar como CSV desde Excel (Archivo → Guardar como → CSV UTF-8).');
            setLoading(false);
          }
        }catch(ex){setErr('Error al procesar el archivo: '+ex.message);setLoading(false);}
      };
      reader.readAsArrayBuffer(file);
    } else {
      reader.onload=ev=>{
        try{
          const rows=parseData(ev.target.result,ext);
          if(!rows.length){setErr('No se encontraron filas válidas. Verificá que el archivo tenga encabezados correctos.');setLoading(false);return;}
          setPreview(rows);setLoading(false);
        }catch(ex){setErr('Error: '+ex.message);setLoading(false);}
      };
      reader.readAsText(file,'UTF-8');
    }
    e.target.value='';
  };

  const confirmar=()=>{
    if(!preview)return;
    const ords=LS.get('o')||[];
    const nuevas=[...preview,...ords];
    LS.set('o',nuevas);
    addLog(session.email,'IMPORTACION',preview.length+' órdenes importadas');
    setOk('✓ Se importaron '+preview.length+' órdenes correctamente.');
    setPreview(null);onSave();
  };

  const COLS=[['Apellido y Nombre / Nombre','Nombre completo del afiliado'],['DNI / CUIL / Documento','Número de documento'],['Siniestro / Nro Siniestro','Número de expediente'],['Cobertura / Obra Social','Aseguradora o cobertura'],['Fecha / Fecha Confección','dd/mm/aaaa o aaaa-mm-dd'],['Prestacion / Prescripción','Estudio o prestación a solicitar'],['Diagnostico / Diagnóstico','Diagnóstico o código CIE'],['Codigo / Código Afirmante','Código del profesional firmante']];

  return(<div style={{maxWidth:860}}>
    <div style={{background:'#fff',border:'0.5px solid '+BR,borderRadius:12,padding:'20px 24px',marginBottom:16}}>
      <div style={{fontWeight:600,fontSize:15,color:DK,marginBottom:4}}>Importar desde Excel o CSV</div>
      <div style={{fontSize:13,color:'#666',marginBottom:16}}>Subí un archivo con encabezados. El sistema detecta las columnas automáticamente.</div>
      <div style={{background:LT,border:'0.5px solid '+BR,borderRadius:8,padding:'12px 16px',marginBottom:16}}>
        <div style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase',marginBottom:8}}>Columnas reconocidas automáticamente</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px 20px',fontSize:12}}>
          {COLS.map(([c,d])=><div key={c}><span style={{fontWeight:600}}>{c}</span><span style={{color:'#888'}}> — {d}</span></div>)}
        </div>
      </div>
      <div onClick={()=>ref.current?.click()} style={{border:'2px dashed '+BR,borderRadius:10,padding:'36px 20px',textAlign:'center',cursor:'pointer',background:LT}}>
        <div style={{fontSize:36,marginBottom:8}}>📂</div>
        <div style={{fontWeight:600,fontSize:14,color:DK}}>Hacé clic para seleccionar un archivo</div>
        <div style={{fontSize:12,color:'#888',marginTop:4}}>Formatos: .csv, .tsv, .txt · Para Excel: exportar como CSV UTF-8</div>
        <input ref={ref} type="file" accept=".csv,.tsv,.txt,.xlsx,.xls" style={{display:'none'}} onChange={handleFile}/>
      </div>
      {loading&&<div style={{marginTop:12,fontSize:13,color:AC}}>Procesando archivo...</div>}
      {err&&<div style={{marginTop:12,background:'#fdecea',border:'1px solid #f5c6cb',borderRadius:8,padding:'10px 14px',color:'#c0392b',fontSize:13}}>{err}</div>}
      {ok&&<div style={{marginTop:12,background:'#d4edda',border:'1px solid #c3e6cb',borderRadius:8,padding:'10px 14px',color:'#155724',fontSize:13}}>{ok}</div>}
    </div>

    {preview&&<div style={{background:'#fff',border:'0.5px solid '+BR,borderRadius:12,padding:'16px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <span style={{fontWeight:600,color:DK}}>Vista previa — {preview.length} registros encontrados</span>
        <div style={{display:'flex',gap:8}}>
          <Btn ch="Cancelar" onClick={()=>setPreview(null)} v="secondary" sm/>
          <Btn ch={'✓ Confirmar importación ('+preview.length+')'} onClick={confirmar} sm/>
        </div>
      </div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead><tr style={{background:LT}}>{['Paciente','DNI/CUIL','Siniestro','Cobertura','Prestación','Diagnóstico','Fecha'].map(h=><th key={h} style={{padding:'6px 8px',textAlign:'left',fontWeight:600,fontSize:11,color:'#888',borderBottom:'0.5px solid '+BR}}>{h}</th>)}</tr></thead>
          <tbody>{preview.slice(0,15).map((r,i)=><tr key={i} style={{borderBottom:'0.5px solid '+LT}}>
            <td style={{padding:'5px 8px',fontWeight:500}}>{r.apellidoNombre||'-'}</td>
            <td style={{padding:'5px 8px'}}>{r.dni||'-'}</td>
            <td style={{padding:'5px 8px'}}>{r.siniestro||'-'}</td>
            <td style={{padding:'5px 8px'}}>{r.cobertura||'-'}</td>
            <td style={{padding:'5px 8px',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.tipoPrestacion||'-'}</td>
            <td style={{padding:'5px 8px'}}>{r.diagnostico||'-'}</td>
            <td style={{padding:'5px 8px',whiteSpace:'nowrap'}}>{fmt(r.fecha)}</td>
          </tr>)}
          {preview.length>15&&<tr><td colSpan={7} style={{padding:'6px 8px',color:'#888',fontSize:11}}>... y {preview.length-15} registros más</td></tr>}
          </tbody>
        </table>
      </div>
    </div>}
  </div>);
}

// ── BUSCAR ÓRDENES ───────────────────────────────────────────────────────────
function BuscarOrdenes({session}){
  const[q,setQ]=useState('');
  const[desde,setDesde]=useState('');
  const[hasta,setHasta]=useState('');
  const[sel,setSel]=useState([]);
  const[,re]=useState(0);
  const profs=LS.get('p')||[];
  const getPNom=id=>{const p=profs.find(x=>x.id===id);return p?p.nombre+' '+p.apellido:'';};

  const ords=LS.get('o')||[];
  const filtradas=ords.filter(o=>{
    const qn=q.toLowerCase();
    if(qn&&!o.apellidoNombre.toLowerCase().includes(qn)&&!o.dni.includes(qn)&&!(o.siniestro||'').toLowerCase().includes(qn))return false;
    if(desde&&o.fecha<desde)return false;
    if(hasta&&o.fecha>hasta)return false;
    return true;
  });

  const toggleSel=(id,c)=>{if(c)setSel(p=>[...p,id]);else setSel(p=>p.filter(x=>x!==id));};
  const toggleAll=c=>setSel(c?filtradas.map(o=>o.id):[]);
  const dlOne=id=>{const o=(LS.get('o')||[]).find(x=>x.id===id);if(!o)return;const d=generarPDF(o);d.save('Orden_'+o.apellidoNombre.replace(/\s+/g,'_')+'_'+(o.siniestro||o.dni)+'.pdf');addLog(session.email,'PDF_DL',o.apellidoNombre);};
  const dlZIP=async(ords2,nom)=>{
    if(!ords2.length){alert('Sin órdenes para descargar.');return;}
    const zip=new JSZip();
    ords2.forEach(o=>{const d=generarPDF(o);zip.file('Orden_'+o.apellidoNombre.replace(/\s+/g,'_')+'_'+(o.siniestro||o.dni)+'.pdf',d.output('arraybuffer'));});
    const c=await zip.generateAsync({type:'blob'});
    const u=URL.createObjectURL(c);const a=document.createElement('a');a.href=u;a.download=nom+'.zip';a.click();URL.revokeObjectURL(u);
    addLog(session.email,'ZIP_DL',ords2.length+' órdenes');
  };
  const dlSel=()=>dlZIP(filtradas.filter(o=>sel.includes(o.id)),'ordenes_seleccion');
  const dlHoy=()=>dlZIP((LS.get('o')||[]).filter(o=>o.fecha===today()),'ordenes_'+today());

  return(<div>
    <div style={{background:'#fff',border:'0.5px solid '+BR,borderRadius:12,padding:'14px 18px',marginBottom:12,display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-end'}}>
      <div style={{flex:1,minWidth:180}}>
        <label style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase',display:'block',marginBottom:4}}>Buscar</label>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Nombre, DNI o N° siniestro..." style={{border:'1.5px solid '+BR,borderRadius:8,padding:'8px 12px',fontSize:14,width:'100%',fontFamily:'inherit',outline:'none'}}/>
      </div>
      <div><label style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase',display:'block',marginBottom:4}}>Desde</label><input type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={{border:'1.5px solid '+BR,borderRadius:8,padding:'8px 10px',fontSize:13,fontFamily:'inherit',outline:'none'}}/></div>
      <div><label style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase',display:'block',marginBottom:4}}>Hasta</label><input type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={{border:'1.5px solid '+BR,borderRadius:8,padding:'8px 10px',fontSize:13,fontFamily:'inherit',outline:'none'}}/></div>
    </div>
    <div style={{background:'#fff',border:'0.5px solid '+BR,borderRadius:12,padding:'14px 18px'}}>
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:13,color:'#666'}}>{filtradas.length} resultado(s)</span>
        <div style={{flex:1}}/>
        <Btn ch="Sel. todas" onClick={()=>toggleAll(true)} v="secondary" sm/>
        <Btn ch={'ZIP selección ('+sel.length+')'} onClick={dlSel} dis={!sel.length} sm/>
        <Btn ch="ZIP lote hoy" onClick={dlHoy} v="secondary" sm/>
      </div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:'0.5px solid '+BR}}>
            <th style={{padding:'5px 6px',width:30}}><input type="checkbox" onChange={e=>toggleAll(e.target.checked)} checked={filtradas.length>0&&sel.length===filtradas.length}/></th>
            {['Paciente','DNI/CUIL','Siniestro','Prestación','Profesional','Fecha','PDF'].map(h=><th key={h} style={{padding:'5px 8px',textAlign:'left',fontWeight:600,fontSize:11,color:'#888'}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {filtradas.length===0&&<tr><td colSpan={8} style={{padding:24,textAlign:'center',color:'#aaa'}}>Sin resultados</td></tr>}
            {filtradas.map(o=><tr key={o.id} style={{borderBottom:'0.5px solid '+LT}}>
              <td style={{padding:'5px 6px'}}><input type="checkbox" checked={sel.includes(o.id)} onChange={e=>toggleSel(o.id,e.target.checked)}/></td>
              <td style={{padding:'5px 8px',fontWeight:500}}>{o.apellidoNombre}</td>
              <td style={{padding:'5px 8px'}}>{o.dni}</td>
              <td style={{padding:'5px 8px'}}>{o.siniestro||'-'}</td>
              <td style={{padding:'5px 8px',maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={o.tipoPrestacion}>{o.tipoPrestacion}</td>
              <td style={{padding:'5px 8px',fontSize:11,color:'#666'}}>{getPNom(o.profesionalId)}</td>
              <td style={{padding:'5px 8px',whiteSpace:'nowrap',color:'#666'}}>{fmt(o.fecha)}</td>
              <td style={{padding:'5px 8px'}}><Btn ch="PDF" onClick={()=>dlOne(o.id)} sm v="secondary"/></td>
            </tr>)}
          </tbody>
        </table>
      </div>
    </div>
  </div>);
}

// ── PROFESIONALES ────────────────────────────────────────────────────────────
function Profesionales({session,onSave}){
  const[modal,setModal]=useState(null);
  const[,re]=useState(0);
  const profs=LS.get('p')||[];
  const toggle=id=>{const pp=LS.get('p')||[];const p=pp.find(x=>x.id===id);if(!p)return;p.activo=!p.activo;LS.set('p',pp);addLog(session.email,p.activo?'PROF_ACT':'PROF_BAJA',id);re(n=>n+1);onSave();};

  return(<div>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
      <Btn ch="+ Nuevo profesional" onClick={()=>setModal({id:uid(),nombre:'',apellido:'',especialidad:'',tipo:'MN',matriculaNum:'',telefono:'',email:'',direccion:'',activo:true,firma:null,_n:true})}/>
    </div>
    <div style={{background:'#fff',border:'0.5px solid '+BR,borderRadius:12,padding:'14px 18px'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{borderBottom:'0.5px solid '+BR}}>{['Nombre','Especialidad','Matrícula','Firma','Estado','Acciones'].map(h=><th key={h} style={{padding:'5px 8px',textAlign:'left',fontWeight:600,fontSize:11,color:'#888'}}>{h}</th>)}</tr></thead>
        <tbody>
          {profs.length===0&&<tr><td colSpan={6} style={{padding:20,textAlign:'center',color:'#aaa'}}>Sin profesionales registrados</td></tr>}
          {profs.map(p=><tr key={p.id} style={{borderBottom:'0.5px solid '+LT}}>
            <td style={{padding:'6px 8px',fontWeight:500}}>{p.nombre} {p.apellido}</td>
            <td style={{padding:'6px 8px'}}>{p.especialidad||'-'}</td>
            <td style={{padding:'6px 8px'}}>{p.tipo} {p.matriculaNum}</td>
            <td style={{padding:'6px 8px'}}>{p.firma?<span style={{background:'#E1F5EE',color:'#085041',fontSize:11,padding:'2px 8px',borderRadius:4}}>Cargada</span>:<span style={{background:'#eee',color:'#666',fontSize:11,padding:'2px 8px',borderRadius:4}}>Sin firma</span>}</td>
            <td style={{padding:'6px 8px'}}>{p.activo?<span style={{background:'#E1F5EE',color:'#085041',fontSize:11,padding:'2px 8px',borderRadius:4}}>Activo</span>:<span style={{background:'#fdecea',color:'#c0392b',fontSize:11,padding:'2px 8px',borderRadius:4}}>Inactivo</span>}</td>
            <td style={{padding:'6px 8px'}}><div style={{display:'flex',gap:4}}>
              <Btn ch="Editar" onClick={()=>setModal({...p})} sm v="secondary"/>
              <Btn ch={p.activo?'Dar de baja':'Activar'} onClick={()=>toggle(p.id)} sm v="danger"/>
            </div></td>
          </tr>)}
        </tbody>
      </table>
    </div>
    {modal&&<ProfModal data={modal} onClose={()=>{setModal(null);re(n=>n+1);onSave();}}/>}
  </div>);
}

function ProfModal({data,onClose}){
  const[f,setF]=useState(data);
  const sf=k=>v=>setF(p=>({...p,[k]:v}));
  const fRef=useRef();
  const cargarFirma=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>setF(p=>({...p,firma:ev.target.result}));r.readAsDataURL(file);};
  const guardar=()=>{
    if(!f.nombre||!f.apellido||!f.matriculaNum){alert('Completá nombre, apellido y matrícula.');return;}
    const pp=LS.get('p')||[];
    const {_n,...prof}=f;
    const i=pp.findIndex(x=>x.id===prof.id);
    if(i>=0)pp[i]=prof;else pp.push(prof);
    LS.set('p',pp);onClose();
  };
  return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:20}} onClick={onClose}>
    <div style={{background:'#fff',borderRadius:14,padding:'24px',maxWidth:520,width:'100%',maxHeight:'88vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:600,fontSize:15,color:DK,marginBottom:16}}>{data._n?'Nuevo profesional':'Editar profesional'}</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><Fld label="Nombre *" value={f.nombre} onChange={sf('nombre')}/><Fld label="Apellido *" value={f.apellido} onChange={sf('apellido')}/></div>
        <Fld label="Especialidad" value={f.especialidad} onChange={sf('especialidad')} ph="Ej: Medicina Laboral"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:10}}>
          <div><label style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase',display:'block',marginBottom:4}}>Tipo mat.</label>
            <select value={f.tipo} onChange={e=>sf('tipo')(e.target.value)} style={{border:'1.5px solid '+BR,borderRadius:8,padding:'9px 10px',fontSize:14,width:'100%',fontFamily:'inherit',outline:'none'}}>
              {['MN','MP','ODO','ENF','KIN','PS'].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <Fld label="N° Matrícula *" value={f.matriculaNum} onChange={sf('matriculaNum')} ph="157645"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><Fld label="Teléfono" value={f.telefono||''} onChange={sf('telefono')}/><Fld label="Email" value={f.email||''} onChange={sf('email')}/></div>
        <Fld label="Dirección" value={f.direccion||''} onChange={sf('direccion')}/>
        <div>
          <label style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase',display:'block',marginBottom:6}}>Firma digital (JPG/PNG — flota sobre la línea en el PDF)</label>
          <div onClick={()=>fRef.current?.click()} style={{border:'2px dashed '+BR,borderRadius:8,padding:'12px',textAlign:'center',cursor:'pointer',minHeight:80,display:'flex',alignItems:'center',justifyContent:'center',background:LT}}>
            {f.firma?<img src={f.firma} alt="firma" style={{maxHeight:70,maxWidth:200,objectFit:'contain'}}/>:<span style={{fontSize:12,color:'#888'}}>Clic para subir imagen de firma</span>}
          </div>
          <input ref={fRef} type="file" accept="image/jpeg,image/png" style={{display:'none'}} onChange={cargarFirma}/>
          {f.firma&&<button onClick={()=>sf('firma')(null)} style={{marginTop:6,fontSize:11,color:'#c0392b',background:'none',border:'none',cursor:'pointer'}}>Quitar firma</button>}
        </div>
      </div>
      <div style={{display:'flex',gap:10,marginTop:18}}>
        <Btn ch="Guardar" onClick={guardar}/>
        <Btn ch="Cancelar" onClick={onClose} v="secondary"/>
      </div>
    </div>
  </div>);
}

// ── USUARIOS ─────────────────────────────────────────────────────────────────
function Usuarios({session,onSave}){
  const[modal,setModal]=useState(null);
  const[,re]=useState(0);
  const users=LS.get('u')||[];
  const toggle=id=>{const uu=LS.get('u')||[];const u=uu.find(x=>x.id===id);if(!u)return;u.activo=!u.activo;LS.set('u',uu);re(n=>n+1);onSave();};

  return(<div>
    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
      <Btn ch="+ Nuevo usuario" onClick={()=>setModal({id:uid(),nombre:'',email:'',password:'',rol:'operador',activo:true,_n:true})}/>
    </div>
    <div style={{background:'#fff',border:'0.5px solid '+BR,borderRadius:12,padding:'14px 18px'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead><tr style={{borderBottom:'0.5px solid '+BR}}>{['Nombre','Email','Rol','Estado','Acciones'].map(h=><th key={h} style={{padding:'5px 8px',textAlign:'left',fontWeight:600,fontSize:11,color:'#888'}}>{h}</th>)}</tr></thead>
        <tbody>
          {users.map(u=><tr key={u.id} style={{borderBottom:'0.5px solid '+LT}}>
            <td style={{padding:'6px 8px',fontWeight:500}}>{u.nombre}</td>
            <td style={{padding:'6px 8px',color:'#666'}}>{u.email}</td>
            <td style={{padding:'6px 8px'}}><span style={{background:u.rol==='admin'?'#E1F5EE':'#eee',color:u.rol==='admin'?'#085041':'#555',fontSize:11,padding:'2px 8px',borderRadius:4}}>{u.rol}</span></td>
            <td style={{padding:'6px 8px'}}>{u.activo?<span style={{background:'#E1F5EE',color:'#085041',fontSize:11,padding:'2px 8px',borderRadius:4}}>Activo</span>:<span style={{background:'#fdecea',color:'#c0392b',fontSize:11,padding:'2px 8px',borderRadius:4}}>Inactivo</span>}</td>
            <td style={{padding:'6px 8px'}}><div style={{display:'flex',gap:4}}>
              <Btn ch="Editar" onClick={()=>setModal({...u})} sm v="secondary"/>
              {u.id!==session.id&&<Btn ch={u.activo?'Dar de baja':'Activar'} onClick={()=>toggle(u.id)} sm v="danger"/>}
            </div></td>
          </tr>)}
        </tbody>
      </table>
    </div>
    {modal&&<UserModal data={modal} curId={session.id} onClose={()=>{setModal(null);re(n=>n+1);onSave();}}/>}
  </div>);
}

function UserModal({data,curId,onClose}){
  const[f,setF]=useState(data);
  const sf=k=>v=>setF(p=>({...p,[k]:v}));
  const[pass,setPass]=useState('');
  const guardar=()=>{
    if(!f.nombre||!f.email){alert('Nombre y email requeridos.');return;}
    const uu=LS.get('u')||[];
    const {_n,...usr}=f;
    if(pass)usr.password=pass;
    else if(_n){alert('La contraseña es requerida para nuevos usuarios.');return;}
    const i=uu.findIndex(x=>x.id===usr.id);
    if(i>=0)uu[i]=usr;else uu.push(usr);
    LS.set('u',uu);onClose();
  };
  return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.45)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:20}} onClick={onClose}>
    <div style={{background:'#fff',borderRadius:14,padding:'24px',maxWidth:420,width:'100%'}} onClick={e=>e.stopPropagation()}>
      <div style={{fontWeight:600,fontSize:15,color:DK,marginBottom:16}}>{data._n?'Nuevo usuario':'Editar usuario'}</div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        <Fld label="Nombre completo *" value={f.nombre} onChange={sf('nombre')}/>
        <Fld label="Email *" value={f.email} onChange={sf('email')} tp="email"/>
        <Fld label={data._n?'Contraseña *':'Nueva contraseña (vacío = sin cambio)'} value={pass} onChange={setPass} tp="password"/>
        <div><label style={{fontSize:11,fontWeight:700,color:AC,letterSpacing:.8,textTransform:'uppercase',display:'block',marginBottom:4}}>Rol</label>
          <select value={f.rol} onChange={e=>sf('rol')(e.target.value)} style={{border:'1.5px solid '+BR,borderRadius:8,padding:'9px 10px',fontSize:14,width:'100%',fontFamily:'inherit',outline:'none'}}>
            <option value="operador">Operador</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
      </div>
      <div style={{display:'flex',gap:10,marginTop:18}}>
        <Btn ch="Guardar" onClick={guardar}/>
        <Btn ch="Cancelar" onClick={onClose} v="secondary"/>
      </div>
    </div>
  </div>);
}

// ── LOGS ──────────────────────────────────────────────────────────────────────

      <span style={{fontWeight:600,color:DK}}>{logs.length} registros</span>

      <thead><tr style={{borderBottom:'0.5px solid '+BR}}>{['Fecha/hora','Usuario','Acción','Detalle'].map(h=><th key={h} style={{padding:'5px 8px',textAlign:'left',fontWeight:600,fontSize:11,color:'#888'}}>{h}</th>)}</tr></thead>
      <tbody>
        {logs.length===0&&<tr><td colSpan={4} style={{padding:20,textAlign:'center',color:'#aaa'}}>Sin registros</td></tr>}
        {logs.map(l=><tr key={l.id} style={{borderBottom:'0.5px solid '+LT}}>
          <td style={{padding:'5px 8px',whiteSpace:'nowrap',fontSize:11,color:'#666'}}>{fmtDT(l.fecha)}</td>

          <td style={{padding:'5px 8px',fontSize:12,color:'#666'}}>{l.det}</td>
        </tr>)}
      </tbody>
    </table>
  </div>);
}
